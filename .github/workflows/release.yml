name: Release Build

# Two trigger modes:
#
#  - Automatic: push a `v*.*.*` tag (`git tag vX.Y.Z && git push origin vX.Y.Z`).
#    Creates a GitHub Release for the tag if one doesn't already exist,
#    then builds + uploads installers for all three platforms in parallel.
#
#  - Manual (`workflow_dispatch` with a `tag` input): lets you re-build
#    installers for an already-published tag without deleting or re-pushing
#    it. Useful when a platform build failed and you want to backfill its
#    asset — e.g. the macOS .dmg for a version tagged on Windows.
#
# The release is held in **draft** state while the platform jobs run
# because GitHub marks a published release as immutable — you can't add
# new assets after it's out. The flow:
#
#   ensure-release → creates (or rewinds an existing published release
#                   into) a draft so asset uploads aren't blocked.
#   build (×3)    → builds Windows / macOS / Linux installers and
#                   uploads them to the draft. `gh release upload
#                   --clobber` overwrites any name collision, so retries
#                   are safe.
#   publish       → flips the draft to published once every build job
#                   finished successfully. If any of them failed the
#                   release stays as a draft so you can inspect the
#                   partial uploads and fix before going out.
#
# Neither the Windows nor macOS builds are code-signed — Gatekeeper /
# SmartScreen will warn on first launch. Wire in Apple Developer ID and
# Windows signing certificates as repo secrets when available and flip
# signAndEditExecutable back on.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.2.4). Leave blank if triggered by tag push.'
        required: false

permissions:
  contents: write

jobs:
  ensure-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - name: Resolve tag
        id: resolve
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          REF_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          if [ -n "$INPUT_TAG" ]; then
            tag="$INPUT_TAG"
          else
            tag="$REF_NAME"
          fi
          if [ -z "$tag" ] || [ "$tag" = "main" ]; then
            echo "Tag is empty or looks like a branch name (got '$tag'). Specify the tag via workflow_dispatch input." >&2
            exit 1
          fi
          echo "tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Ensure draft release exists
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.resolve.outputs.tag }}
        shell: bash
        run: |
          # GitHub marks a published release as immutable — a second
          # attempt to upload would fail with "Cannot upload assets to an
          # immutable release". If we find a published release for this
          # tag, tear it down first so we can rebuild from scratch and
          # publish atomically at the end.
          existing_json=$(gh release view "$TAG" --repo "${{ github.repository }}" --json isDraft,name,body 2>/dev/null || echo "")
          if [ -n "$existing_json" ]; then
            is_draft=$(echo "$existing_json" | jq -r '.isDraft')
            if [ "$is_draft" = "true" ]; then
              echo "Draft release $TAG already exists — will append assets to it."
              exit 0
            fi
            echo "Published release $TAG exists but is immutable; recreating as draft."
            gh release delete "$TAG" --repo "${{ github.repository }}" --yes --cleanup-tag=false
          fi

          echo "Creating draft release $TAG"
          gh release create "$TAG" \
            --repo "${{ github.repository }}" \
            --title "$TAG" \
            --notes "## Nexus $TAG" \
            --target "${{ github.sha }}" \
            --draft

  build:
    needs: ensure-release
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cmd: npx electron-builder --win nsis --publish never --config.win.signAndEditExecutable=false
            assets: |
              release/*.exe
              release/*.exe.blockmap
          - os: macos-latest
            cmd: npx electron-builder --mac dmg zip --publish never
            assets: |
              release/*.dmg
              release/*.zip
          - os: ubuntu-latest
            cmd: npx electron-builder --linux AppImage deb tar.gz --publish never
            assets: |
              release/*.AppImage
              release/*.deb
              release/*.tar.gz

    runs-on: ${{ matrix.os }}
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.ensure-release.outputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        name: Vite build

      - name: Package installer
        env:
          # Disable Apple codesign when no cert is configured so the build
          # still produces a working (unnotarised) .app / .dmg.
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ matrix.os == 'macos-latest' && 'false' || '' }}
        run: ${{ matrix.cmd }}

      - name: List built artifacts
        shell: bash
        run: ls -lh release/ || true

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.ensure-release.outputs.tag }}
        shell: bash
        run: |
          shopt -s nullglob
          files=()
          while IFS= read -r line; do
            # Expand each glob line against the workspace
            for f in $line; do
              [ -f "$f" ] && files+=("$f")
            done
          done <<< '${{ matrix.assets }}'

          if [ ${#files[@]} -eq 0 ]; then
            echo "No matching artifacts found for ${{ matrix.os }} — failing so the missing platform is visible." >&2
            exit 1
          fi

          for f in "${files[@]}"; do
            echo "Uploading $f"
            gh release upload "$TAG" "$f" --clobber --repo "${{ github.repository }}"
          done

  publish:
    needs: [ensure-release, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.ensure-release.outputs.tag }}
        shell: bash
        run: |
          echo "Publishing draft release $TAG"
          gh release edit "$TAG" --repo "${{ github.repository }}" --draft=false
