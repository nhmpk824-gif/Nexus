name: Release Build

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to upload assets to (e.g. v0.1.3)"
        required: true

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cmd: npx electron-builder --win nsis --publish never --config.win.signAndEditExecutable=false
          - os: macos-latest
            cmd: npx electron-builder --mac dmg zip --publish never
          - os: ubuntu-latest
            cmd: npx electron-builder --linux AppImage deb --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        name: Vite build

      - run: ${{ matrix.cmd }}
        name: Package installer

      - name: List built artifacts
        shell: bash
        run: ls -lh release/

      - name: Upload assets to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ github.event.release.tag_name || github.event.inputs.tag }}"
          shopt -s nullglob
          files=(release/*.exe release/*.dmg release/*.zip release/*.AppImage release/*.deb)
          for f in "${files[@]}"; do
            echo "Uploading $f ..."
            gh release upload "$tag" "$f" || echo "Skipped $f (may already exist)"
          done
