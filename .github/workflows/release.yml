name: Release Build

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.1.4)"
        required: true

permissions:
  contents: write

jobs:
  create-draft:
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create.outputs.upload_url }}
    steps:
      - name: Create draft release
        id: create
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          upload_url=$(gh api repos/${{ github.repository }}/releases \
            -f tag_name="${{ github.event.inputs.tag }}" \
            -f target_commitish="main" \
            -f name="${{ github.event.inputs.tag }}" \
            -F draft=true \
            -f body="## Nexus ${{ github.event.inputs.tag }}" \
            --jq '.upload_url')
          echo "upload_url=$upload_url" >> "$GITHUB_OUTPUT"

  build:
    needs: create-draft
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            cmd: npx electron-builder --win nsis --publish never --config.win.signAndEditExecutable=false
          - os: macos-latest
            cmd: npx electron-builder --mac dmg zip --publish never
          - os: ubuntu-latest
            cmd: npx electron-builder --linux AppImage deb --publish never

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag }}

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build
        name: Vite build

      - run: ${{ matrix.cmd }}
        name: Package installer

      - name: List built artifacts
        shell: bash
        run: ls -lh release/

      - name: Upload assets to draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          tag="${{ github.event.inputs.tag }}"
          shopt -s nullglob
          files=(release/*.exe release/*.dmg release/*.zip release/*.AppImage release/*.deb)
          for f in "${files[@]}"; do
            echo "Uploading $f ..."
            gh release upload "$tag" "$f"
          done

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ github.event.inputs.tag }}" --repo ${{ github.repository }} --draft=false
