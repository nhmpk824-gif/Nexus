name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    strategy:
      # Keep the remaining matrix legs running even if one platform regresses
      # so we surface all three OS failures at once.
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npx tsc --noEmit
        name: Type check

      - run: npm run lint
        name: Lint

      - run: npm run build
        name: Vite build

      - run: npm test
        name: Run tests
