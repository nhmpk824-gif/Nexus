name: 🐛 Bug Report
description: Report something broken or misbehaving in Nexus.
title: "[Bug]: "
labels: ["bug", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug! Please fill out the details below so it can be reproduced and fixed.

  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear, short description of the bug.
      placeholder: "When I click X, the pet freezes and audio cuts out."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
      placeholder: "The pet should continue responding and audio should keep playing."
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Numbered steps someone else can follow.
      placeholder: |
        1. Launch Nexus v0.2.9 on Windows 11
        2. Enable wake word in Settings → Voice
        3. Say the wake word 3 times in 10 seconds
        4. Observe pet stops responding on the 3rd trigger
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Nexus version
      placeholder: "v0.2.9"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows 11
        - Windows 10
        - macOS (Apple Silicon)
        - macOS (Intel)
        - Linux
        - Other (describe in logs section)
    validations:
      required: true

  - type: dropdown
    id: install-type
    attributes:
      label: How did you install?
      options:
        - Pre-built installer from Releases
        - Built from source (npm run build)
        - Other
    validations:
      required: true

  - type: textarea
    id: providers
    attributes:
      label: LLM / STT / TTS providers in use
      description: If the bug relates to voice or chat, list which providers were active.
      placeholder: "LLM: Anthropic claude-sonnet-4-6 | STT: sherpa-onnx local | TTS: edge-tts"

  - type: textarea
    id: logs
    attributes:
      label: Logs, console output, screenshots
      description: |
        Paste any relevant errors. Logs live in:
        - Windows: `%APPDATA%\nexus\logs\`
        - macOS: `~/Library/Application Support/nexus/logs/`
        - Linux: `~/.config/nexus/logs/`
      render: shell

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-flight checks
      options:
        - label: I searched existing issues and this isn't a duplicate
          required: true
        - label: I'm on the latest release (or built from main)
          required: true
